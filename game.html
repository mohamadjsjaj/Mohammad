<!DOCTYPE html>
<html>
<head>
    <title>Click Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: black;
            color: white;
        }

        button {
            padding: 20px;
            font-size: 20px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🎮 Click Game</h1>
    <p>Score: <span id="score">0</span></p>

    <button onclick="addScore()">Click Me!</button>

    <script>
        let score = 0;

        function addScore() {
            score++;
            document.getElementById("score").innerText = score;
        }
    </script>

</body>
</html>
